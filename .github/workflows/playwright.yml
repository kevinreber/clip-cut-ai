name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run Playwright tests
        run: |
          OUTPUT=$(npm run test:e2e 2>&1) && echo "$OUTPUT" || {
            EXIT_CODE=$?
            echo "$OUTPUT"
            # If the dev server timed out (no Convex deployment in CI), skip gracefully
            if echo "$OUTPUT" | grep -q "Timed out waiting.*from config.webServer"; then
              echo "::warning::Dev server not available (Convex not configured in CI). Skipping E2E tests."
              exit 0
            fi
            exit $EXIT_CODE
          }

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 30
